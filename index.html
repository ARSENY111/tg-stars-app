<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stars App</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="bg-black text-[#f5f5f5] font-sans antialiased select-none overflow-hidden">

    <div class="flex flex-col h-screen justify-between p-4 max-w-md mx-auto">
        
        <div class="flex justify-center w-full mt-2">
            <div id="app-header" class="flex items-center justify-between w-full bg-island h-11 px-2 rounded-full border border-[#363636] shadow-lg shadow-black/50">
                <div class="flex items-center gap-1.5 pl-2">
                    <span class="w-2 h-2 rounded-full bg-[#34c759] shadow-sm shadow-[#34c759]/50 animate-pulse"></span>
                    <span id="online-count" class="text-[11px] font-bold text-[#34c759] tracking-tight">10</span>
                </div>
                <div class="h-8 px-3 rounded-full bg-[#363636] border border-[#474747] flex items-center gap-1 text-xs font-bold text-white">
                    <span>⭐</span>
                    <span id="balance-stars">1,250</span>
                </div>
            </div>
        </div>

        <div id="main-content" class="w-full flex flex-col justify-start overflow-y-auto max-h-[72vh] mt-4 mb-auto">
            
            <div id="screen-main" class="w-full flex flex-col items-center justify-center my-auto fade-in">
                <p class="text-[#7a7a7a] text-sm font-medium">Экран игры (Тут пока пусто)</p>
            </div>

            <div id="screen-profile" class="w-full flex flex-col hidden fade-in px-2 mt-2">
                <div class="bg-island rounded-2xl border border-[#363636] p-5 w-full flex flex-col items-center shadow-lg relative">
                    
                    <div id="user-avatar" class="w-20 h-20 rounded-full border-2 border-[#474747] flex items-center justify-center text-3xl font-bold text-white mb-3 shadow-md">
                        ?
                    </div>
                    
                    <h2 id="user-name" class="text-lg font-bold text-white leading-tight">Загрузка...</h2>
                    <p id="user-username" class="text-xs text-[#7a7a7a] mt-0.5">@username</p>

                    <div class="w-full h-[1px] bg-[#363636] my-4"></div>

                    <div class="w-full space-y-3">
                        <div class="flex flex-col items-center p-3 bg-[#1c1c1c] rounded-xl border border-[#2d2d2d] w-full">
                            <span class="text-xs text-[#7a7a7a] font-medium">Баланс аккаунта</span>
                            <span class="text-sm font-bold text-white mt-0.5 flex items-center gap-1">⭐ <span id="profile-balance">1,250</span></span>
                        </div>

                        <div class="grid grid-cols-2 gap-2">
                            <button id="btn-deposit-open" class="tap-target bg-[#34c759] text-black font-bold py-2.5 rounded-xl text-xs cursor-pointer tracking-wide text-center">
                                Пополнить
                            </button>
                            <button id="btn-withdraw-open" class="tap-target bg-[#363636] border border-[#474747] text-white font-bold py-2.5 rounded-xl text-xs cursor-pointer tracking-wide text-center">
                                Вывести
                            </button>
                        </div>
                    </div>
                    
                </div>

                <div id="modal-deposit" class="hidden fixed inset-x-0 bottom-0 bg-[#1c1c1c] border-t border-[#363636] rounded-t-3xl p-6 z-50 shadow-2xl transition-transform duration-300 transform translate-y-full">
                    <div class="w-12 h-1 bg-[#363636] rounded-full mx-auto mb-4"></div>
                    <h3 class="text-md font-bold text-center mb-4 text-white">Пополнение баланса</h3>
                    <div class="space-y-4">
                        <input type="number" id="input-deposit" placeholder="Количество Stars (например: 50)" class="w-full bg-black border border-[#363636] rounded-xl p-3 text-sm text-white text-center focus:outline-none focus:border-[#34c759]">
                        <button id="btn-deposit-confirm" class="tap-target w-full bg-[#34c759] text-black font-bold py-3 rounded-xl text-sm cursor-pointer">
                            Оплатить через Telegram Stars
                        </button>
                    </div>
                </div>

                <div id="modal-withdraw" class="hidden fixed inset-x-0 bottom-0 bg-[#1c1c1c] border-t border-[#363636] rounded-t-3xl p-6 z-50 shadow-2xl transition-transform duration-300 transform translate-y-full">
                    <div class="w-12 h-1 bg-[#363636] rounded-full mx-auto mb-4"></div>
                    <h3 class="text-md font-bold text-center mb-2 text-white">Вывод средств</h3>
                    <p class="text-[11px] text-[#7a7a7a] text-center mb-4">Вывод производится на ваш TON-кошелек по курсу 100 ⭐ = 1 TON</p>
                    <div class="space-y-3">
                        <input type="text" id="input-withdraw-wallet" placeholder="Ваш TON адрес (UQ...)" class="w-full bg-black border border-[#363636] rounded-xl p-3 text-xs text-white focus:outline-none focus:border-[#2f93e4]">
                        <input type="number" id="input-withdraw-amount" placeholder="Количество Stars для вывода" class="w-full bg-black border border-[#363636] rounded-xl p-3 text-xs text-white focus:outline-none focus:border-[#2f93e4]">
                        <button id="btn-withdraw-confirm" class="tap-target w-full bg-[#2f93e4] text-white font-bold py-3 rounded-xl text-sm cursor-pointer">
                            Создать заявку на вывод
                        </button>
                    </div>
                </div>

                <div id="modal-overlay" class="hidden fixed inset-0 bg-black/60 z-40 transition-opacity duration-300 opacity-0"></div>
            </div>

        </div>

        <div class="flex justify-center w-full mb-2">
            <div id="app-footer" class="flex items-center justify-between w-full bg-island h-11 px-2 rounded-full border border-[#363636] shadow-lg shadow-black/50 relative">
                
                <button id="inventory-btn" class="tap-target w-8 h-8 rounded-full bg-[#363636] border border-[#474747] flex items-center justify-center text-sm cursor-pointer">
                    💼
                </button>
                
                <button id="home-btn" class="tap-target w-12 h-12 rounded-full bg-[#363636] border border-[#474747] flex items-center justify-center cursor-pointer absolute left-1/2 -translate-x-1/2 -top-3 shadow-lg shadow-black/40 overflow-hidden">
                    <img src="images/home.png" alt="Home" class="w-full h-full object-cover rounded-full">
                </button>

                <button id="account-btn" class="tap-target w-8 h-8 rounded-full bg-[#363636] border border-[#474747] flex items-center justify-center text-sm cursor-pointer">
                    👤
                </button>
                
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
