<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crypto Lot Mini App</title>
    <!-- Подключаем Tailwind CSS для красивого и быстрого дизайна -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Подключаем Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Плавные переходы для кнопок */
        .btn-animate {
            transition: transform 0.1s ease, filter 0.1s ease;
        }
        .btn-animate:active {
            transform: scale(0.95);
            filter: brightness(0.9);
        }
    </style>
</head>
<body class="bg-[#1c1c1e] text-white font-sans antialiased select-none overflow-hidden">

    <!-- ОСНОВНОЙ КОНТЕЙНЕР АППКИ -->
    <div class="flex flex-col h-screen p-4 justify-between">
        
        <!-- ХЕДЕР: Баланс пользователя -->
        <div class="flex justify-between items-center bg-[#2c2c2e] p-3 rounded-2xl shadow-lg">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-full bg-gradient-to-r from-yellow-400 to-amber-500 flex items-center justify-center font-bold text-black text-sm">⭐</div>
                <div>
                    <p class="text-xs text-gray-400 font-medium">Баланс Stars</p>
                    <p id="stars-balance" class="text-md font-bold text-yellow-400">1,250</p>
                </div>
            </div>
            <div class="flex items-center gap-2 bg-[#3a3a3c] px-3 py-1.5 rounded-xl border border-gray-700">
                <span class="text-xs text-gray-300 font-semibold">💎 0 NFT</span>
            </div>
        </div>

        <!-- ГЛАВНАЯ ЗОНА (Экран игры / Лутбокса / Скретч-карты) -->
        <div class="flex flex-col items-center justify-center my-auto text-center px-4">
            
            <!-- Интерактивная карточка (заготовка под будущую механику) -->
            <div id="main-card" class="w-full max-w-sm aspect-[4/5] bg-gradient-to-b from-[#2c2c2e] to-[#232325] rounded-3xl border border-gray-800 shadow-2xl flex flex-col items-center justify-between p-6 relative overflow-hidden group">
                
                <!-- Эффект свечения на заднем фоне -->
                <div class="absolute -top-20 -left-20 w-40 h-40 bg-purple-600/20 rounded-full blur-3xl"></div>
                <div class="absolute -bottom-20 -right-20 w-40 h-40 bg-amber-500/10 rounded-full blur-3xl"></div>

                <div class="text-gray-400 text-xs tracking-wider uppercase font-semibold mt-2">Эксклюзивный Дроп</div>
                
                <!-- Сюда потом вставим 3D-модель, гифку или анимацию скретч-карты -->
                <div class="my-auto transform group-hover:scale-105 transition-transform duration-300">
                    <div class="w-32 h-32 bg-gradient-to-tr from-purple-600 to-indigo-600 rounded-2xl shadow-xl shadow-purple-900/30 flex items-center justify-center text-5xl animate-pulse">
                        🎁
                    </div>
                </div>

                <div class="w-full z-10">
                    <h2 class="text-xl font-bold mb-1">Секретный Подарок</h2>
                    <p class="text-xs text-gray-400 px-4">Испытай удачу! Внутри может быть редкий NFT-сувенир или джекпот в Stars</p>
                </div>
            </div>

        </div>

        <!-- ФУТЕР: Главная кнопка действия -->
        <div class="w-full pb-2">
            <button id="action-btn" class="btn-animate w-full bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-950/50 text-center tracking-wide text-md">
                Открыть за 25 ⭐
            </button>
        </div>

    </div>

    <!-- СКРИПТ ДЛЯ ИНИЦИАЛИЗАЦИИ TELEGRAM -->
    <script>
        // Инициализируем Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // Расширяем приложение на весь экран телефона

        // Подстраиваем цвета темы (опционально, если нужно идеально попасть в цвета ТГ)
        if (tg.backgroundColor) {
            document.body.style.backgroundColor = tg.backgroundColor;
        }

        // Обработка клика на главную кнопку
        const actionBtn = document.getElementById('action-btn');
        actionBtn.addEventListener('click', () => {
            // Простая вибрация на телефоне при нажатии
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }
            
            alert('Здесь запустится покупка за Stars или анимация лутбокса!');
        });
    </script>
</body>
</html>
