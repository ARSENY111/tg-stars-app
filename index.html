<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stars App</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        .tap-target {
            transition: transform 0.08s ease, opacity 0.08s ease;
        }
        .tap-target:active {
            transform: scale(0.97);
            opacity: 0.85;
        }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-black text-[#f5f5f5] font-sans antialiased select-none overflow-hidden">

    <div class="flex flex-col h-screen justify-between p-4 max-w-md mx-auto">
        
        <div id="app-header" class="flex justify-between items-center bg-[#1a1a1a] px-4 py-3 rounded-xl border border-[#2d2d2d]">
            <div>
                <p class="text-[11px] uppercase tracking-wider text-[#7a7a7a] font-bold">Баланс</p>
                <div class="flex items-center gap-1.5 mt-0.5">
                    <span class="text-base">⭐</span>
                    <span id="balance-stars" class="text-base font-bold text-white tracking-tight">0</span>
                </div>
            </div>
            <div id="balance-nft" class="bg-[#262626] px-3 py-1.5 rounded-lg text-xs font-medium text-[#a3a3a3] border border-[#333333]">
                🎁 0 Подарков
            </div>
        </div>

        <div id="main-content" class="my-auto w-full flex flex-col items-center justify-center">
            </div>

        <div id="app-footer" class="w-full flex flex-col gap-2">
            </div>

    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
    </script>
</body>
</html>
