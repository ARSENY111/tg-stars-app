<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stars App</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="bg-black text-[#f5f5f5] font-sans antialiased select-none overflow-hidden">

    <div class="flex flex-col h-screen justify-between p-4 max-w-md mx-auto">
        
        <div class="flex justify-center w-full mt-2">
            <div id="app-header" class="flex items-center justify-between w-2/3 bg-island h-11 px-2 rounded-full border border-[#363636] shadow-lg shadow-black/50">
                
                <div class="flex items-center gap-1.5 pl-2">
                    <span class="w-2 h-2 rounded-full bg-[#34c759] shadow-sm shadow-[#34c759]/50 animate-pulse"></span>
                    <span id="online-count" class="text-[11px] font-medium text-[#a3a3a3] tracking-tight">10</span>
                </div>

                <div class="h-8 px-3 rounded-full bg-[#363636] border border-[#474747] flex items-center gap-1 text-xs font-bold text-white">
                    <span>⭐</span>
                    <span id="balance-stars">1,250</span>
                </div>
            </div>
        </div>

        <div id="main-content" class="my-auto w-full flex flex-col items-center justify-center">
            </div>

        <div class="flex justify-center w-full mb-2">
            <div id="app-footer" class="flex items-center justify-start w-2/3 bg-island h-11 px-2 rounded-full border border-[#363636] shadow-lg shadow-black/50">
                
                <button id="account-btn" class="tap-target w-8 h-8 rounded-full bg-[#363636] border border-[#474747] flex items-center justify-center text-sm cursor-pointer">
                    👤
                </button>
                
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
