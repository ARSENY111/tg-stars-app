<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stars App</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="bg-black text-[#f5f5f5] font-sans antialiased select-none overflow-hidden">

    <div class="flex flex-col h-screen justify-between p-4 max-w-md mx-auto">
        
<div class="flex justify-center w-full mt-2">
            <div id="app-header" class="flex items-center justify-between w-full bg-island h-11 px-4 rounded-full border border-[#363636] shadow-lg shadow-black/50">
                <div class="flex items-center gap-1.5">
                    <span class="w-2 h-2 rounded-full bg-[#34c759] shadow-sm shadow-[#34c759]/50 animate-pulse"></span>
                    <span id="online-count" class="text-[11px] font-bold text-[#34c759] tracking-tight">10</span>
                </div>
                
                <div class="flex items-center gap-1 bg-[#2e2e2e] py-1 px-2.5 rounded-full border border-[#424242]">
                    <span id="stars-balance" class="text-[12px] font-black text-white tracking-tight">0</span>
                    <span class="text-[11px]">⭐️</span>
                </div>
            </div>
        </div>

        <div id="main-content" class="w-full flex flex-col justify-start overflow-y-auto max-h-[72vh] mt-4 mb-auto">
            
            <div id="screen-main" class="w-full flex flex-col items-center justify-center my-auto fade-in">
                <p class="text-[#7a7a7a] text-sm font-medium">Экран игры (Тут пока пусто)</p>
            </div>

            <div id="screen-profile" class="w-full flex flex-col hidden fade-in px-2 mt-2">
                <div class="bg-island rounded-2xl border border-[#363636] p-5 w-full flex flex-col items-center shadow-lg relative mb-4">
                    
                    <div id="user-avatar" class="w-20 h-20 rounded-full border-2 border-[#474747] flex items-center justify-center text-3xl font-bold text-white mb-3 shadow-md">
                        ?
                    </div>
                    
                    <h2 id="user-name" class="text-lg font-bold text-white leading-tight">Загрузка...</h2>
                    <p id="user-username" class="text-xs text-[#7a7a7a] mt-0.5">@username</p>
                    
                </div>

                <div class="bg-island rounded-2xl border border-[#363636] p-4 w-full flex flex-col items-center shadow-lg">
                    <button id="buy-stars-btn" class="tap-target w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-xl text-sm transition-colors cursor-pointer shadow-md shadow-blue-600/20">
                        Пополнить баланс на 50 ⭐️
                    </button>
                </div>
            </div>

        </div>

        <div class="flex justify-center w-full mb-2">
            <div id="app-footer" class="flex items-center justify-between w-full bg-island h-11 px-2 rounded-full border border-[#363636] shadow-lg shadow-black/50 relative">
                
                <button id="inventory-btn" class="tap-target w-8 h-8 rounded-full bg-[#363636] border border-[#474747] flex items-center justify-center text-sm cursor-pointer">
                    💼
                </button>
                
                <button id="home-btn" class="tap-target w-12 h-12 rounded-full bg-[#363636] border border-[#474747] flex items-center justify-center cursor-pointer absolute left-1/2 -translate-x-1/2 -top-3 shadow-lg shadow-black/40 overflow-hidden">
                    <img src="images/home.png" alt="Home" class="w-full h-full object-cover rounded-full">
                </button>

                <button id="account-btn" class="tap-target w-8 h-8 rounded-full bg-[#363636] border border-[#474747] flex items-center justify-center text-sm cursor-pointer">
                    👤
                </button>
                
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
